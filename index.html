<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ZINMINI SHOP</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#050510;
    background-image:
    radial-gradient(circle at center,#25104a 0%,#050510 70%);
    color:white;
}

.card{
    width:90%;
    max-width:420px;
    background:#090915;
    border:1px solid rgba(255,255,255,.05);
    border-radius:32px;
    padding:35px 25px;
    text-align:center;
    box-shadow:0 0 30px rgba(168,85,247,.25);
}

.avatar{
    width:120px;
    height:120px;
    border-radius:50%;
    object-fit:cover;
    border:5px solid #a855f7;
    box-shadow:0 0 25px #a855f7;
}

.link-box{
    margin:20px auto;
    padding:12px 20px;
    border-radius:999px;
    background:#121225;
    border:1px solid rgba(168,85,247,.2);
    color:#8b7cff;
    font-size:15px;
    display:inline-block;
}

.title{
    font-size:34px;
    font-weight:800;
    margin-top:10px;
    margin-bottom:15px;
}

.desc{
    color:#bdbdbd;
    font-size:18px;
    line-height:1.8;
}

.progress{
    width:100%;
    height:8px;
    background:#1e1e30;
    border-radius:999px;
    overflow:hidden;
    margin:30px 0;
}

.progress-bar{
    width:40%;
    height:100%;
    background:linear-gradient(90deg,#5865F2,#c084fc);
}

.discord-btn{
    display:block;
    width:100%;
    padding:18px;
    border-radius:20px;
    text-decoration:none;
    background:#5865F2;
    color:white;
    font-size:22px;
    font-weight:bold;
    box-shadow:0 0 25px rgba(88,101,242,.5);
}

.footer{
    margin-top:25px;
    color:#555;
    font-size:12px;
    letter-spacing:3px;
}
</style>
</head>

<body>

<div class="card">

<img
class="avatar"
src="51CF07E0-D246-4D4C-98A8-C0EDD9DC4F14.png"
alt="avatar">

<div class="link-box">
● discord.gg/kSp3z3crwa
</div>

<div class="title">
ZINMINI SHOP
</div>

<div class="desc">
Chào cậu, mình là zinmini Shop.<br>
Click để tham gia server Discord của mình nhé! 💜
</div>

<div class="progress">
<div class="progress-bar"></div>
</div>

<a class="discord-btn"
href="https://discord.gg/kSp3z3crwa">
🎮 Tham gia Discord
</a>

<div class="footer">
ZINMINI SHOP • REDIRECTING
</div>

</div>

<script>
setTimeout(() => {
window.location.href = "https://discord.gg/kSp3z3crwa";
}, 5000);
</script>

</body>
</html>
