<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ZINMINI SHOP</title>

<meta property="og:title" content="ZINMINI">
<meta property="og:description" content="Chào cậu, mình là zinmini. Click để tham gia server Discord của mình nhé! 💜">
<meta property="og:url" content="https://zinmini.vercel.app">
<meta property="og:type" content="website">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#050510;
background-image:
linear-gradient(rgba(255,255,255,.02) 1px, transparent 1px),
linear-gradient(90deg, rgba(255,255,255,.02) 1px, transparent 1px);
background-size:40px 40px;
min-height:100vh;
display:flex;
justify-content:center;
align-items:flex-start;
padding-top:70px;
padding-left:15px;
padding-right:15px;
}

.card{
width:100%;
max-width:280px;
background:#090915;
border-radius:22px;
padding:15px;
text-align:center;
box-shadow:0 0 20px rgba(177,77,255,.15);
}

.avatar{
width:75px;
height:75px;
border-radius:50%;
object-fit:cover;
border:3px solid #b14dff;
box-shadow:0 0 15px #b14dff;
}

.link-box{
margin-top:12px;
padding:8px;
background:#111122;
border:1px solid rgba(177,77,255,.2);
border-radius:999px;
color:#ffffff;
font-size:12px;
}

.title{
margin-top:15px;
font-size:28px;
font-weight:700;
line-height:1.1;
color:#ffffff;
}

.desc{
margin-top:15px;
font-size:13px;
color:#ffffff;
line-height:1.6;
}

.progress{
margin-top:18px;
height:5px;
background:#1c1c30;
border-radius:999px;
overflow:hidden;
}

.progress-bar{
height:100%;
width:100%;
background:linear-gradient(90deg,#5865F2,#c084fc);
}

.btn{
display:block;
margin-top:18px;
padding:11px;
background:#5865F2;
border-radius:12px;
text-decoration:none;
color:white;
font-size:15px;
font-weight:bold;
box-shadow:0 0 15px rgba(88,101,242,.35);
}

.footer{
margin-top:15px;
font-size:10px;
letter-spacing:2px;
color:#ffffff;
}
</style>
</head>

<body>

<div class="card">

<img
src="51CF07E0-D246-4D4C-98A8-C0EDD9DC4F14.png"
class="avatar"
alt="avatar">

<div class="link-box">
● discord.gg/kSp3z3crwa
</div>

<div class="title">
ZINMINI SHOP
</div>

<div class="desc">
Đang đưa bạn vào server Discord của zinmini Shop...
</div>

<div class="progress">
<div class="progress-bar"></div>
</div>

<a class="btn" href="https://discord.gg/kSp3z3crwa">
🎮 Tham gia Discord
</a>

<div class="footer">
ZINMINI SHOP • REDIRECTING
</div>

</div>

<script>
setTimeout(() => {
window.location.href = "https://discord.gg/kSp3z3crwa";
}, 5000);
</script>

</html>
