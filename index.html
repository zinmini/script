min-height:100vh;
display:flex;
justify-content:center;
align-items:flex-start;
padding-top:120px;
color:white;
}

.card{
width:90%;
max-width:420px;
background:#090915;
border:1px solid rgba(255,255,255,.05);
border-radius:32px;

margin-bottom:15px;
}

.desc{
color:#bcbcbc;
font-size:18px;
line-height:1.8;
}

.progress{
width:100%;
height:8px;
background:#1d1d30;
border-radius:999px;
overflow:hidden;
margin:30px 0;
}

.progress-bar{
height:100%;
width:100%;
background:linear-gradient(90deg,#5865F2,#c084fc);
}

.discord-btn{
display:block;
width:100%;
padding:18px;
border-radius:20px;
text-decoration:none;
background:#5865F2;
color:white;
font-size:22px;
font-weight:bold;
box-shadow:0 0 25px rgba(88,101,242,.45);
