<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZINMINI SHOP</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#1e1f22;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.embed{
    width:100%;
    max-width:900px;
    background:#2b2d31;
    border-left:8px solid #a855f7;
    border-radius:6px;
    padding:25px;
}

.title{
    color:#5aa2ff;
    font-size:42px;
    margin-bottom:25px;
}

.description{
    color:#dcddde;
    font-size:26px;
    line-height:1.7;
    margin-bottom:30px;
}

.profile{
    display:flex;
    align-items:center;
    gap:20px;
    margin-bottom:25px;
}

.avatar{
    width:100px;
    height:100px;
    border-radius:50%;
    object-fit:cover;
    border:4px solid #a855f7;
}

.info{
    flex:1;
}

.name{
    color:white;
    font-size:28px;
    font-weight:bold;
}

.link{
    color:#a855f7;
    margin-top:8px;
    font-size:18px;
}

.button{
    display:inline-block;
    background:#5865F2;
    color:white;
    text-decoration:none;
    padding:16px 28px;
    border-radius:10px;
    font-size:22px;
    font-weight:bold;
    margin-top:10px;
}

.button:hover{
    opacity:0.9;
}

@media(max-width:700px){
    .title{
        font-size:28px;
    }

    .description{
        font-size:18px;
    }

    .profile{
        flex-direction:column;
        text-align:center;
    }

    .name{
        font-size:24px;
    }
}
</style>
</head>

<body>

<div class="embed">

    <div class="title">
        ZINMINI
    </div>

    <div class="description">
        Chào cậu, mình là zinmini. Click để tham gia
        server Discord của mình nhé! 💜
    </div>

    <div class="profile">
        <img class="avatar"
        src="51CF07E0-D246-4D4C-98A8-C0EDD9DC4F14.png">

        <div class="info">
            <div class="name">
                ZINMINI SHOP
            </div>

            <div class="link">
                discord.gg/kSp3z3crwa
            </div>
        </div>
    </div>

    <a class="button"
    href="https://discord.gg/kSp3z3crwa">
        🎮 Tham gia Discord
    </a>

</div>

</body>
</html>
